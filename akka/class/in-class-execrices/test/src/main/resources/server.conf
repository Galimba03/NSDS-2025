akka {
  actor {
    provider = "akka.remote.RemoteActorRefProvider" // Or "akka.cluster.ClusterActorRefProvider"
  }
  remote {
    artery {
      transport = tcp // Explicitly use TCP for Artery
      canonical {
        hostname = "127.0.0.1"
        port = 25520 // Use the default Artery port or your desired port
      }
    }
  }
}

